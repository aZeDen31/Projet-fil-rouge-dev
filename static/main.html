<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="https://kit.fontawesome.com/b0c1f84340.js" crossorigin="anonymous"></script>
    <title>SPOTIFIÉ</title>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="card-main">
        <div class="music-card">
            <img src="../img/album placeholder.jpg" alt="Pochette d'album">
            <div class="music-info">
                <h3>Titre de la chanson</h3>
                <p>Artiste</p>
            </div>
            <div class="music-actions">
                <button class="btn btn-play"><i class="fa-solid fa-play"></i></button>
                <button class="btn btn-like"><i class="fa-solid fa-heart"></i></button>
                <button class="btn btn-dislike"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>

    </main>
    <script src="../JS/header-loader.js"></script>
</body>
</html>
